source:
  type: topology_api
  ref: https://topology.internal.example/api/v1/topology
services:
  - id: frontend
    name: frontend
    replicas: 2
    support:
      observations: 2
      evidence:
        - topology_api
        - service_registry
    labels:
      team: web
  - id: checkout
    replicas: 3
    reliability:
      live_probability: 0.985
      source: sre-calibration
      confidence: 0.80
    failure_eligible: true
    labels:
      team: commerce
    placements:
      - replicas: 2
        reliability:
          live_probability: 0.990
          source: az-history
          confidence: 0.75
        labels:
          region: us-east-1
          az: us-east-1a
          node_pool: blue
      - replicas: 1
        labels:
          region: us-east-1
          az: us-east-1b
          node_pool: green
    shared_resource_refs:
      - kafka-orders
  - id: payment
edges:
  - from: frontend
    to: checkout
    kind: sync
    blocking: true
    identity:
      protocol: http
      operation: GET
      route: /checkout
    weight: 0.9
    reliability:
      live_probability: 0.995
      source: dependency-slo
      confidence: 0.85
    resilience:
      request_timeout_ms: 2000
      retry:
        max_attempts: 3
        budget_cap: 1.5
        retry_on:
          - 5xx
          - gateway-error
          - timeout
        backoff:
          initial_ms: 50
          max_ms: 500
          multiplier: 2
      circuit_breaker:
        enabled: true
        max_pending_requests: 1024
    observed:
      latency_ms:
        p50: 40
        p90: 120
        p95: 250
        p99: 900
      error_rate: 0.02
    policy_scope:
      source_endpoint_id: frontend:GET /checkout
      method: GET
      source_route: /checkout
  - from: checkout
    to: payment
    kind: async
    identity:
      protocol: kafka
      topic: payment-events
      span_kind: producer
endpoints:
  - entry_service: frontend
    method: GET
    path: checkout
    predicate_ref: catalog.frontend.checkout.success
    semantics:
      predicate_mode: immediate_response
      mandatory_targets:
        - checkout
      dependency_modes:
        - sync
      source: service-catalog
      confidence: 0.9
  - entry_service: checkout
    method: POST
    path: /process
    predicate_ref: catalog.checkout.process.eventual
    semantics:
      predicate_mode: eventual_completion
      mandatory_targets:
        - payment
      dependency_modes:
        - sync
        - async
      source: service-catalog
      confidence: 0.8
    weight: 0.6
