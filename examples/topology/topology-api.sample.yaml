source:
  type: topology_api
  ref: https://topology.internal.example/api/v1/topology
services:
  - id: frontend
    name: frontend
    replicas: 2
    support:
      observations: 2
      evidence:
        - topology_api
        - service_registry
    labels:
      team: web
  - id: checkout
    replicas: 3
    failure_eligible: true
    labels:
      team: commerce
    placements:
      - replicas: 2
        labels:
          region: us-east-1
          az: us-east-1a
          node_pool: blue
      - replicas: 1
        labels:
          region: us-east-1
          az: us-east-1b
          node_pool: green
    shared_resource_refs:
      - kafka-orders
  - id: payment
edges:
  - from: frontend
    to: checkout
    kind: sync
    blocking: true
    id: frontend|checkout|sync|true
    weight: 0.9
    resilience:
      request_timeout_ms: 2000
      retry:
        max_attempts: 3
        budget_cap: 1.5
        retry_on:
          - 5xx
          - gateway-error
          - timeout
        backoff:
          initial_ms: 50
          max_ms: 500
          multiplier: 2
      circuit_breaker:
        enabled: true
        max_pending_requests: 1024
    observed:
      latency_ms:
        p50: 40
        p90: 120
        p95: 250
        p99: 900
      error_rate: 0.02
    policy_scope:
      source_endpoint_id: frontend:GET /checkout
      method: GET
      source_route: /checkout
  - from: checkout
    to: payment
    kind: async
endpoints:
  - entry_service: frontend
    method: GET
    path: checkout
    predicate_ref: catalog.frontend.checkout.success
  - entry_service: checkout
    method: POST
    path: /process
    weight: 0.6
