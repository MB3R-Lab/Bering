name: Publish Schema

on:
  push:
    tags:
      - "schema-v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve contract metadata
        id: contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          raw = Path("internal/schema/constants.go").read_text(encoding="utf-8")
          const_match = re.search(r"const\s*\((.*?)\n\)", raw, re.S)
          if not const_match:
              raise SystemExit("failed to find const block in internal/schema/constants.go")

          values = {}
          for line in const_match.group(1).splitlines():
              line = line.strip()
              if not line or line.startswith("//"):
                  continue
              match = re.match(r"([A-Za-z0-9_]+)\s*=\s*(.+)", line)
              if not match:
                  continue
              name, value = match.groups()
              values[name] = value.strip()

          def resolve(name):
              if name not in values:
                  raise KeyError(name)
              value = values[name]
              if value.startswith('"') and value.endswith('"'):
                  return value[1:-1]
              return resolve(value)

          out = {
              "model_schema_version": resolve("ExpectedSchemaVersion"),
              "model_schema_uri": resolve("ExpectedSchemaURI"),
              "model_schema_digest": resolve("ExpectedSchemaDigest"),
              "snapshot_schema_version": resolve("ExpectedSnapshotSchemaVersion"),
              "snapshot_schema_uri": resolve("ExpectedSnapshotSchemaURI"),
              "snapshot_schema_digest": resolve("ExpectedSnapshotSchemaDigest"),
          }

          event_name = os.environ["GITHUB_EVENT_NAME"]
          if event_name == "push":
              ref_name = os.environ["GITHUB_REF_NAME"]
              prefix = "schema-v"
              if not ref_name.startswith(prefix):
                  raise SystemExit(f"unexpected tag: {ref_name}; expected schema-v*")
              tag_version = ref_name[len(prefix):]
              if tag_version != out["model_schema_version"] or tag_version != out["snapshot_schema_version"]:
                  raise SystemExit(
                      "tag version mismatch: "
                      f"tag={tag_version} "
                      f"model={out['model_schema_version']} "
                      f"snapshot={out['snapshot_schema_version']}"
                  )
          else:
              tag_version = out["model_schema_version"]

          out["tag_version"] = tag_version

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              for key, value in out.items():
                  fh.write(f"{key}={value}\n")
          PY

      - name: Validate schema JSON and $id binding
        shell: bash
        env:
          MODEL_SCHEMA_VERSION: ${{ steps.contract.outputs.model_schema_version }}
          EXPECTED_MODEL_URI: ${{ steps.contract.outputs.model_schema_uri }}
          EXPECTED_MODEL_DIGEST: ${{ steps.contract.outputs.model_schema_digest }}
          SNAPSHOT_SCHEMA_VERSION: ${{ steps.contract.outputs.snapshot_schema_version }}
          EXPECTED_SNAPSHOT_URI: ${{ steps.contract.outputs.snapshot_schema_uri }}
          EXPECTED_SNAPSHOT_DIGEST: ${{ steps.contract.outputs.snapshot_schema_digest }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          checks = [
              (
                  Path(f"api/schema/model/v{os.environ['MODEL_SCHEMA_VERSION']}/model.schema.json"),
                  os.environ["EXPECTED_MODEL_URI"],
                  os.environ["EXPECTED_MODEL_DIGEST"],
              ),
              (
                  Path(f"api/schema/snapshot/v{os.environ['SNAPSHOT_SCHEMA_VERSION']}/snapshot.schema.json"),
                  os.environ["EXPECTED_SNAPSHOT_URI"],
                  os.environ["EXPECTED_SNAPSHOT_DIGEST"],
              ),
          ]

          for schema_path, expected_uri, expected_digest in checks:
              raw = schema_path.read_bytes()
              payload = json.loads(raw.decode("utf-8"))
              actual_uri = payload.get("$id")
              if actual_uri != expected_uri:
                  raise SystemExit(
                      f"schema $id mismatch for {schema_path}: got={actual_uri!r} want={expected_uri!r}"
                  )

              digest = "sha256:" + hashlib.sha256(raw).hexdigest()
              if digest != expected_digest:
                  raise SystemExit(
                      f"schema digest mismatch for {schema_path}: got={digest!r} want={expected_digest!r}"
                  )
          PY

      - name: Build publish artifact
        shell: bash
        env:
          MODEL_SCHEMA_VERSION: ${{ steps.contract.outputs.model_schema_version }}
          MODEL_SCHEMA_URI: ${{ steps.contract.outputs.model_schema_uri }}
          MODEL_SCHEMA_DIGEST: ${{ steps.contract.outputs.model_schema_digest }}
          SNAPSHOT_SCHEMA_VERSION: ${{ steps.contract.outputs.snapshot_schema_version }}
          SNAPSHOT_SCHEMA_URI: ${{ steps.contract.outputs.snapshot_schema_uri }}
          SNAPSHOT_SCHEMA_DIGEST: ${{ steps.contract.outputs.snapshot_schema_digest }}
        run: |
          set -euo pipefail

          ROOT="out"
          MODEL_LATEST_DIR="${ROOT}/schema/model/latest"
          SNAPSHOT_LATEST_DIR="${ROOT}/schema/snapshot/latest"

          mkdir -p "${ROOT}/schema" "${MODEL_LATEST_DIR}" "${SNAPSHOT_LATEST_DIR}"

          cp -R api/schema/model "${ROOT}/schema/"
          cp -R api/schema/snapshot "${ROOT}/schema/"
          cp "api/schema/model/v${MODEL_SCHEMA_VERSION}/model.schema.json" "${MODEL_LATEST_DIR}/model.schema.json"
          cp "api/schema/snapshot/v${SNAPSHOT_SCHEMA_VERSION}/snapshot.schema.json" "${SNAPSHOT_LATEST_DIR}/snapshot.schema.json"

          UPDATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > "${ROOT}/schema/index.json" <<EOF
          {
            "name": "io.mb3r.bering.model",
            "version": "${MODEL_SCHEMA_VERSION}",
            "uri": "${MODEL_SCHEMA_URI}",
            "digest": "${MODEL_SCHEMA_DIGEST}",
            "model": {
              "name": "io.mb3r.bering.model",
              "version": "${MODEL_SCHEMA_VERSION}",
              "uri": "${MODEL_SCHEMA_URI}",
              "digest": "${MODEL_SCHEMA_DIGEST}"
            },
            "snapshot": {
              "name": "io.mb3r.bering.snapshot",
              "version": "${SNAPSHOT_SCHEMA_VERSION}",
              "uri": "${SNAPSHOT_SCHEMA_URI}",
              "digest": "${SNAPSHOT_SCHEMA_DIGEST}"
            },
            "contracts": [
              {
                "name": "io.mb3r.bering.model",
                "version": "${MODEL_SCHEMA_VERSION}",
                "uri": "${MODEL_SCHEMA_URI}",
                "digest": "${MODEL_SCHEMA_DIGEST}"
              },
              {
                "name": "io.mb3r.bering.snapshot",
                "version": "${SNAPSHOT_SCHEMA_VERSION}",
                "uri": "${SNAPSHOT_SCHEMA_URI}",
                "digest": "${SNAPSHOT_SCHEMA_DIGEST}"
              }
            ],
            "updated_at": "${UPDATED_AT}"
          }
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
