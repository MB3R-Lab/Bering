# Override release naming if needed.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/mb3r-lab/bering
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  automount: false
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65532

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  annotations: {}
  ports:
    http:
      port: 8080
      targetPort: 8080
    grpc:
      enabled: false
      port: 4317
      targetPort: 4317

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

env: []
envFrom: []
extraArgs: []
extraVolumes: []
extraVolumeMounts: []

persistence:
  enabled: false
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClassName: ""

config:
  existingConfigMap: ""
  fileName: serve.yaml
  server:
    listenAddress: ""
    grpcListenAddress: ""
    maxRequestBytes: 5242880
  runtime:
    flushInterval: 5s
    windowSize: 30s
    maxInMemorySpans: 10000
    lateSpanPolicy: drop
    reconciliation:
      enabled: true
      statePath: /var/lib/bering/reconciliation-state.json
      reportPath: /var/lib/bering/reconciliation-report.json
      rawWindowPath: /var/lib/bering/latest-raw-window.json
      stableCorePath: /var/lib/bering/latest-stable-core.json
      decayHalfLife: 10m
      minimumOpportunityWindows: 2
      telemetryHealthFreezeThreshold: 0.55
      softGapMultiplier: 1.5
      hardGapMultiplier: 3.0
      minimumSoftWindows: 2
      minimumHardWindows: 5
      stableCoreMinBelief: 0.7
      stableCoreMinActivity: 0.35
      guardrailUnionMinBelief: 0.3
      retirementMinBelief: 0.18
      retiredTTL: 24h
      maxRetainedRetiredEntities: 500
      compactionInterval: 150s
  sink:
    directory: /var/lib/bering/snapshots
    latestPath: ""
  logging:
    structured: true
  overlays: []

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
