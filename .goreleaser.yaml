version: 2

project_name: bering
dist: dist

before:
  hooks:
    - go mod download

builds:
  - id: bering
    main: ./cmd/bering
    binary: bering
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: release
    ids:
      - bering
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

sboms:
  - id: archives
    artifacts: archive
    ids:
      - release
    documents:
      - "{{ .ArtifactName }}.sbom.json"

snapshot:
  version_template: "{{ if .Env.RELEASE_VERSION }}{{ .Env.RELEASE_VERSION }}{{ else }}0.0.0-dev{{ end }}"
